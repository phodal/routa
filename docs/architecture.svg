<svg width="1440" height="980" viewBox="0 0 1440 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1440" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="heroLine" x1="84" y1="0" x2="1356" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="0.56" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.05"/>
    </filter>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="5.8" refY="3.5" orient="auto">
      <path d="M0.9 0.9L5.8 3.5L0.9 6.1" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 30px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .subtitle { font: 500 15px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .section { font: 700 22px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .panelTitle { font: 700 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .body { font: 500 14px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 500 12px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; }
      .tag { font: 700 11px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="1440" height="980" rx="20" fill="url(#pageBg)"/>
  <rect x="28" y="28" width="1384" height="924" rx="18" fill="none" stroke="rgba(148,163,184,0.18)"/>

  <circle cx="1286" cy="124" r="112" fill="#DBEAFE" opacity="0.42"/>
  <circle cx="168" cy="852" r="132" fill="#ECFDF5" opacity="0.55"/>
  <circle cx="1186" cy="836" r="86" fill="#FEF3C7" opacity="0.45"/>

  <text x="84" y="88" class="title">Routa.js Architecture</text>
  <text x="84" y="118" class="subtitle">ACP-centric view of the current implementation: product surface → runtime surfaces → orchestration core → provider families → execution substrates</text>
  <rect x="84" y="138" width="1272" height="4" rx="2" fill="url(#heroLine)"/>

  <rect x="84" y="144" width="1272" height="88" rx="16" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#panelShadow)"/>
  <rect x="84" y="144" width="8" height="88" rx="4" fill="#3B82F6"/>
  <rect x="112" y="156" width="96" height="24" rx="10" fill="#EFF6FF"/>
  <text x="128" y="172" class="tag" fill="#1D4ED8">PRODUCT</text>
  <text x="112" y="202" class="section">Product Surface</text>
  <text x="112" y="222" class="body">Workspace / Session / Kanban / Team / Settings / Traces</text>
  <text x="720" y="202" class="body">Shared domain model</text>
  <text x="720" y="222" class="body">across Web and Desktop</text>

  <rect x="84" y="274" width="610" height="182" rx="16" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#panelShadow)"/>
  <rect x="84" y="274" width="8" height="182" rx="4" fill="#3B82F6"/>
  <rect x="112" y="292" width="74" height="24" rx="10" fill="#EFF6FF"/>
  <text x="128" y="308" class="tag" fill="#1D4ED8">WEB</text>
  <text x="112" y="342" class="section">Web Runtime</text>
  <text x="112" y="370" class="body">Next.js pages and route handlers in `src/app/`</text>
  <text x="112" y="394" class="body">REST / ACP / MCP / A2A / AG-UI / A2UI / SSE</text>
  <text x="112" y="418" class="body">`RoutaSystem` wires stores, tools, and automation</text>

  <rect x="746" y="274" width="610" height="182" rx="16" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#panelShadow)"/>
  <rect x="746" y="274" width="8" height="182" rx="4" fill="#10B981"/>
  <rect x="774" y="292" width="104" height="24" rx="10" fill="#ECFDF5"/>
  <text x="790" y="308" class="tag" fill="#047857">DESKTOP</text>
  <text x="774" y="342" class="section">Desktop Runtime</text>
  <text x="774" y="370" class="body">Tauri shell plus Axum server powered by Rust `AppState`</text>
  <text x="774" y="394" class="body">REST / ACP / MCP / RPC / sandbox / worktree / filesystem</text>
  <text x="774" y="418" class="body">Local-first SQLite, Docker, and native process execution</text>

  <rect x="168" y="494" width="1104" height="210" rx="16" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#panelShadow)"/>
  <rect x="168" y="494" width="8" height="210" rx="4" fill="#F59E0B"/>
  <rect x="196" y="512" width="126" height="24" rx="10" fill="#FFFBEB"/>
  <text x="212" y="528" class="tag" fill="#B45309">ORCHESTRATION</text>
  <text x="196" y="564" class="section">ACP / Session Orchestration Core</text>
  <text x="196" y="590" class="body">Session lifecycle, provider selection, streams, tools, kanban, persistence</text>

  <rect x="196" y="624" width="236" height="56" rx="12" fill="#FFF8EB" stroke="#FCD34D" filter="url(#softShadow)"/>
  <text x="216" y="644" class="panelTitle">Session Lifecycle</text>
  <text x="216" y="660" class="small">create / prompt / cancel</text>
  <text x="216" y="675" class="small">stream / reconnect</text>

  <rect x="454" y="624" width="236" height="56" rx="12" fill="#FFF8EB" stroke="#FCD34D" filter="url(#softShadow)"/>
  <text x="474" y="644" class="panelTitle">Provider Abstraction</text>
  <text x="474" y="660" class="small">adapters, registry, presets</text>
  <text x="474" y="675" class="small">normalized events</text>

  <rect x="712" y="624" width="236" height="56" rx="12" fill="#FFF8EB" stroke="#FCD34D" filter="url(#softShadow)"/>
  <text x="732" y="644" class="panelTitle">Task / Kanban Binding</text>
  <text x="732" y="660" class="small">lane automation, queueing</text>
  <text x="732" y="675" class="small">worktree, supervision</text>

  <rect x="970" y="624" width="274" height="56" rx="12" fill="#FFF8EB" stroke="#FCD34D" filter="url(#softShadow)"/>
  <text x="990" y="644" class="panelTitle">Event + Persistence</text>
  <text x="990" y="660" class="small">EventBus, SSE, traces</text>
  <text x="990" y="675" class="small">session/task/note/artifact stores</text>

  <rect x="84" y="734" width="610" height="102" rx="16" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#panelShadow)"/>
  <rect x="84" y="734" width="8" height="102" rx="4" fill="#3B82F6"/>
  <rect x="112" y="752" width="82" height="24" rx="10" fill="#EFF6FF"/>
  <text x="128" y="768" class="tag" fill="#1D4ED8">BYOK</text>
  <text x="112" y="800" class="section">SDK / API Provider Family</text>
  <text x="112" y="824" class="body">Claude Code SDK / OpenCode SDK / OpenAI API / Anthropic API / Gemini API</text>

  <rect x="746" y="734" width="610" height="102" rx="16" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#panelShadow)"/>
  <rect x="746" y="734" width="8" height="102" rx="4" fill="#F59E0B"/>
  <rect x="774" y="752" width="72" height="24" rx="10" fill="#FFFBEB"/>
  <text x="790" y="768" class="tag" fill="#B45309">ACP</text>
  <text x="774" y="800" class="section">CLI / Container Provider Family</text>
  <text x="774" y="824" class="body">Claude CLI translation / Codex / Gemini CLI / Copilot / Docker OpenCode / ACP presets</text>

  <rect x="84" y="864" width="392" height="84" rx="16" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#panelShadow)"/>
  <rect x="84" y="864" width="8" height="84" rx="4" fill="#3B82F6"/>
  <text x="112" y="892" class="panelTitle">Substrate (CLI / Runner)</text>
  <text x="112" y="916" class="small">Local CLI processes or runner proxy</text>
  <text x="112" y="932" class="small">for Codex, Gemini CLI, Copilot, Claude CLI</text>

  <rect x="524" y="864" width="392" height="84" rx="16" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#panelShadow)"/>
  <rect x="524" y="864" width="8" height="84" rx="4" fill="#F59E0B"/>
  <text x="552" y="892" class="panelTitle">Substrate (SDK / BYOK)</text>
  <text x="552" y="916" class="small">Claude Code SDK, OpenCode SDK, and</text>
  <text x="552" y="932" class="small">direct API integrations for remote/serverless use</text>

  <rect x="964" y="864" width="392" height="84" rx="16" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#panelShadow)"/>
  <rect x="964" y="864" width="8" height="84" rx="4" fill="#10B981"/>
  <text x="992" y="892" class="panelTitle">Substrate (Docker)</text>
  <text x="992" y="916" class="small">Docker OpenCode plus sandboxing</text>
  <text x="992" y="932" class="small">for isolated local infrastructure and controlled execution</text>

  <path d="M720 232V274" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M390 456V494" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1050 456V494" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M480 704V734" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M960 704V734" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M280 836V864" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M720 836V864" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1160 836V864" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
