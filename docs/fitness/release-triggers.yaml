release_triggers:
  - name: release_manifest_missing
    type: manifest_missing
    severity: critical
    action: block_release

  # Layer 1: Release Exposure Surface
  # Detects forbidden content in final release artifacts.
  - name: unexpected_sourcemap_in_release
    type: unexpected_file
    patterns:
      - "**/*.map"
    apply_to:
      - npm_tarball
      - tauri_bundle
      - static_release_assets
    severity: critical
    action: block_release

  - name: unexpected_debug_artifacts
    type: unexpected_file
    patterns:
      - "**/*.d.ts.map"
      - "**/fixture/**"
      - "**/testdata/**"
      - "**/docs/**"
      - "**/__tests__/**"
      - "**/*.test.*"
      - "**/*.spec.*"
    apply_to:
      - npm_tarball
    severity: high
    action: require_human_review

  # Layer 2: Artifact Drift
  # Detects abnormal growth in binary or tarball size relative to baseline.
  - name: cli_binary_growth_guard
    type: artifact_size_delta
    apply_to:
      - cli_binary
    group_by:
      - target
      - arch
      - channel
    baseline: last_successful_same_target
    max_growth_percent: 20
    min_growth_bytes: 2097152
    max_size_bytes: 62914560
    severity: high
    action: require_human_review

  - name: npm_tarball_growth_guard
    type: artifact_size_delta
    apply_to:
      - npm_tarball
    group_by:
      - target
      - channel
    baseline: last_successful_same_channel
    max_growth_percent: 20
    min_growth_bytes: 5242880
    max_size_bytes: 83886080
    max_file_count: 2500
    severity: high
    action: require_human_review

  - name: static_release_assets_growth_guard
    type: artifact_size_delta
    apply_to:
      - static_release_assets
    group_by:
      - channel
    max_growth_percent: 20
    min_growth_bytes: 5242880
    max_size_bytes: 157286400
    max_file_count: 5000
    severity: high
    action: require_human_review

  - name: tauri_bundle_growth_guard
    type: artifact_size_delta
    apply_to:
      - tauri_bundle
    group_by:
      - target
      - arch
    baseline: last_successful_same_target
    max_growth_percent: 20
    min_growth_bytes: 10485760
    severity: high
    action: require_human_review

  # Layer 3: Packaging Boundary Drift
  # Detects changes to packaging configs that may silently widen the release surface.
  - name: packaging_boundary_changed
    type: release_boundary_change
    paths:
      - package.json
      - package-lock.json
      - apps/desktop/package.json
      - apps/desktop/src-tauri/tauri.conf.json
      - apps/desktop/src-tauri/tauri.android.conf.json
      - scripts/release/**
      - scripts/build/**
      - scripts/prepare-frontend.mjs
      - .github/workflows/**
    severity: high
    action: require_human_review

  # Layer 4: Supply-chain & Capability Drift
  # Detects changes to dependencies, Tauri capabilities, or workflow permissions.
  - name: capability_or_supply_chain_drift
    type: capability_change
    paths:
      - package-lock.json
      - apps/desktop/src-tauri/capabilities/**
      - apps/desktop/src-tauri/tauri.conf.json
      - .github/workflows/**
    severity: high
    action: require_human_review
