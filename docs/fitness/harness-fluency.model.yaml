version: 2
levels:
  - id: awareness
    name: Awareness
  - id: assisted_coding
    name: Assisted Coding
  - id: structured_ai_coding
    name: Structured AI Coding
  - id: agent_centric
    name: Agent-Centric
  - id: agent_first
    name: Agent-First

dimensions:
  - id: collaboration
    name: Task Delegation
  - id: sdlc
    name: Process Expansion
  - id: harness
    name: Workflow Loop
  - id: governance
    name: Verification & Guardrails
  - id: context
    name: Context Readiness

capability_groups:
  - id: collaboration
    name: Task Delegation & Collaboration
  - id: sdlc
    name: Process Expansion & Follow-through
  - id: harness
    name: Workflow Loop & Runtime Surface
  - id: governance
    name: Verification & Guardrails
  - id: context
    name: Context Readiness & Memory

criteria:
  - id: collaboration.awareness.contract_surface
    level: awareness
    dimension: collaboration
    weight: 2
    critical: true
    why_it_matters: Repositories need an explicit human-agent contract before collaboration can scale.
    recommended_action: Add a checked-in collaboration contract such as AGENTS.md or equivalent contributor guidance.
    evidence_hint: AGENTS.md, CLAUDE.md, GEMINI.md, Copilot instructions, or equivalent AI collaboration guidance
    detector:
      type: any_of
      detectors:
        - type: any_file_exists
          paths:
            - AGENTS.md
            - CLAUDE.md
            - GEMINI.md
            - .github/copilot-instructions.md
            - .cursorrules
            - .cursor/rules
            - .gemini
        - type: glob_contains_regex
          patterns:
            - README.md
            - CONTRIBUTING.md
            - docs/**/*.md
            - .github/**/*.md
          pattern: '\b(claude code|codex|cursor|gemini|copilot)\b.{0,60}\b(instructions|workflow|guide|rules)\b|\b(instructions|workflow|guide|rules)\b.{0,60}\b(claude code|codex|cursor|gemini|copilot)\b'
          flags: i
          minMatches: 1
  - id: collaboration.awareness.ai_entrypoints
    level: awareness
    dimension: collaboration
    weight: 1
    critical: false
    why_it_matters: Visible AI entrypoints help contributors discover how the repository expects AI tooling to be used.
    recommended_action: Add checked-in AI guidance in repo-facing docs, manifests, or workflows.
    evidence_hint: README.md, AGENTS.md, package.json, or .github/workflows mentioning agent or AI usage
    detector:
      type: glob_contains_regex
      patterns:
        - README.md
        - AGENTS.md
        - CLAUDE.md
        - .github/copilot-instructions.md
        - docs/**/*.md
        - package.json
        - Cargo.toml
        - pyproject.toml
        - .github/workflows/*.yml
        - .github/workflows/*.yaml
      pattern: '\b(agent|agents|assistant|assistants|copilot|claude|codex|cursor|windsurf|llm|prompt|openai|anthropic|gemini|kimi|ai coding|ai assistant)\b'
      flags: i
      minMatches: 1

  - id: collaboration.assisted.collaboration_templates
    level: assisted_coding
    dimension: collaboration
    weight: 2
    critical: true
    why_it_matters: Assisted coding is more repeatable when issue and contribution handoff surfaces are checked in.
    recommended_action: Add issue, PR, or contribution templates that shape AI-human collaboration.
    evidence_hint: docs/issues or .github/ISSUE_TEMPLATE
    detector:
      type: any_file_exists
      paths:
        - docs/issues
        - .github/ISSUE_TEMPLATE
        - .github/PULL_REQUEST_TEMPLATE.md
        - CONTRIBUTING.md
  - id: collaboration.assisted.command_surface
    level: assisted_coding
    dimension: collaboration
    weight: 1
    critical: false
    why_it_matters: Durable collaboration needs checked-in command surfaces rather than ad hoc local conventions.
    recommended_action: Add reusable checked-in command definitions through scripts, task runners, or workflow entrypoints.
    evidence_hint: package.json scripts, Makefile targets, Taskfile tasks, or pyproject command tasks
    detector:
      type: glob_contains_regex
      patterns:
        - package.json
        - Makefile
        - justfile
        - Taskfile.yml
        - Taskfile.yaml
        - pyproject.toml
        - Cargo.toml
      pattern: '("scripts"\s*:\s*\{)|(^[A-Za-z0-9][A-Za-z0-9._-]*:\s*(?:#.*)?$)|(\[project\.scripts\])|(\[tool\.poe\.tasks\])|(\[\[bin\]\])'
      flags: im
      minMatches: 1

  - id: collaboration.structured_ai_coding.ai_workflow_defs
    level: structured_ai_coding
    dimension: collaboration
    weight: 2
    critical: true
    why_it_matters: Structured AI coding shows up when AI-specific workflows or flows are codified in the repo.
    recommended_action: Add AI, agent, copilot, or flow-oriented workflow definitions.
    evidence_hint: .github/workflows/*agent*.yml or resources/flows/*.yaml
    detector:
      type: glob_count
      patterns:
        - .github/workflows/*ai*.yml
        - .github/workflows/*ai*.yaml
        - .github/workflows/*agent*.yml
        - .github/workflows/*agent*.yaml
        - .github/workflows/*copilot*.yml
        - .github/workflows/*copilot*.yaml
        - resources/flows/*.yaml
      min: 1
  - id: collaboration.structured_ai_coding.reusable_roles
    level: structured_ai_coding
    dimension: collaboration
    weight: 1
    critical: false
    why_it_matters: Reusable roles or commands make collaboration repeatable across multiple tasks and contributors.
    recommended_action: Add reusable specialist, command, or skill definitions.
    evidence_hint: resources/specialists or .claude/commands
    detector:
      type: any_file_exists
      paths:
        - resources/specialists
        - .claude/commands
        - .agents/skills

  - id: collaboration.agent_centric.role_catalog_depth
    level: agent_centric
    dimension: collaboration
    weight: 2
    critical: true
    why_it_matters: Agent-centric systems expose a deeper role catalog than a single generic assistant surface.
    recommended_action: Expand the checked-in role, command, or skill catalog.
    evidence_hint: resources/specialists/**/*.yaml or .claude/commands/**/*.md
    detector:
      type: glob_count
      patterns:
        - resources/specialists/**/*.yaml
        - .claude/commands/**/*.md
        - .agents/skills/**/*.md
      min: 5
  - id: collaboration.agent_centric.collaboration_backlog
    level: agent_centric
    dimension: collaboration
    weight: 1
    critical: false
    why_it_matters: Agent-centric collaboration benefits from durable backlog or task intake surfaces.
    recommended_action: Keep a checked-in issue or backlog handoff surface.
    evidence_hint: docs/issues or .github/ISSUE_TEMPLATE
    detector:
      type: any_file_exists
      paths:
        - docs/issues
        - .github/ISSUE_TEMPLATE
        - .github/PULL_REQUEST_TEMPLATE.md

  - id: collaboration.agent_first.review_or_merge_automation
    level: agent_first
    dimension: collaboration
    weight: 2
    critical: true
    why_it_matters: Agent-first collaboration needs explicit review or merge automation instead of only manual fallbacks.
    recommended_action: Add review, merge, or flow-oriented automation definitions.
    evidence_hint: .github/workflows/*review*.yml or resources/flows/*review*.yaml
    detector:
      type: glob_count
      patterns:
        - .github/workflows/*review*.yml
        - .github/workflows/*review*.yaml
        - .github/workflows/*merge*.yml
        - .github/workflows/*merge*.yaml
        - resources/flows/*review*.yaml
      min: 1
  - id: collaboration.agent_first.role_catalog_scale
    level: agent_first
    dimension: collaboration
    weight: 1
    critical: false
    why_it_matters: Higher-maturity collaboration usually comes with broader role specialization and more reusable execution surfaces.
    recommended_action: Expand the checked-in role or command catalog to cover more review and delivery work.
    evidence_hint: resources/specialists/**/*.yaml or .claude/commands/**/*.md
    detector:
      type: glob_count
      patterns:
        - resources/specialists/**/*.yaml
        - .claude/commands/**/*.md
        - .agents/skills/**/*.md
      min: 10

  - id: sdlc.awareness.repository_manifest
    level: awareness
    dimension: sdlc
    weight: 2
    critical: true
    why_it_matters: A baseline SDLC starts with a checked-in repository manifest or build definition.
    recommended_action: Add a primary language or package manifest.
    evidence_hint: package.json, Cargo.toml, pyproject.toml, or go.mod
    detector:
      type: any_file_exists
      paths:
        - package.json
        - Cargo.toml
        - pyproject.toml
        - go.mod
  - id: sdlc.awareness.ci_workflow
    level: awareness
    dimension: sdlc
    weight: 1
    critical: false
    why_it_matters: Even early AI usage should land inside a repeatable CI or validation surface.
    recommended_action: Add at least one CI workflow.
    evidence_hint: .github/workflows/*.yml
    detector:
      type: glob_count
      patterns:
        - .github/workflows/*.yml
        - .github/workflows/*.yaml
      min: 1

  - id: sdlc.assisted.test_surface
    level: assisted_coding
    dimension: sdlc
    weight: 2
    critical: true
    why_it_matters: Assisted coding should already rely on executable test surfaces rather than manual spot checks.
    recommended_action: Add or keep checked-in test files across the repository.
    evidence_hint: tests, __tests__, or language-native test files
    detector:
      type: glob_count
      patterns:
        - tests/**/*.*
        - "**/__tests__/**/*.*"
        - src/**/*.test.*
        - src/**/*.spec.*
        - "**/*_test.go"
        - crates/**/*test*.rs
      min: 2
  - id: sdlc.assisted.validation_surface
    level: assisted_coding
    dimension: sdlc
    weight: 1
    critical: false
    why_it_matters: Assisted workflows are steadier when validation hooks are checked in alongside the code.
    recommended_action: Add pre-commit, workflow, or task-runner validation surfaces.
    evidence_hint: .pre-commit-config.yaml or .github/workflows
    detector:
      type: any_file_exists
      paths:
        - .github/workflows
        - .pre-commit-config.yaml
        - .husky
        - Makefile
        - justfile

  - id: sdlc.structured_ai_coding.quality_evidence
    level: structured_ai_coding
    dimension: sdlc
    weight: 2
    critical: true
    why_it_matters: Structured AI coding should leave behind durable quality evidence or test rulebooks.
    recommended_action: Add docs or directories for fitness, QA, API, or end-to-end validation.
    evidence_hint: docs/fitness, docs/qa, tests/api-contract, or e2e
    detector:
      type: any_file_exists
      paths:
        - docs/fitness
        - docs/qa
        - tests/api-contract
        - e2e
  - id: sdlc.structured_ai_coding.multi_step_ci
    level: structured_ai_coding
    dimension: sdlc
    weight: 1
    critical: false
    why_it_matters: Structured delivery usually spans more than one validation job or workflow.
    recommended_action: Add multiple CI workflows that cover different validation concerns.
    evidence_hint: .github/workflows/*.yml
    detector:
      type: glob_count
      patterns:
        - .github/workflows/*.yml
        - .github/workflows/*.yaml
      min: 3

  - id: sdlc.agent_centric.maintenance_automation
    level: agent_centric
    dimension: sdlc
    weight: 2
    critical: true
    why_it_matters: Agent-centric SDLC maturity often shows up in automated repair, cleanup, or triage loops.
    recommended_action: Add fix, cleanup, or triage automation to the repository.
    evidence_hint: .github/workflows/*fix*.yml or scripts/*cleanup*
    detector:
      type: glob_count
      patterns:
        - .github/workflows/*fix*.yml
        - .github/workflows/*fix*.yaml
        - .github/workflows/*cleanup*.yml
        - .github/workflows/*cleanup*.yaml
        - .github/workflows/*triage*.yml
        - .github/workflows/*triage*.yaml
        - .github/scripts/*fix*
        - scripts/*cleanup*
      min: 1
  - id: sdlc.agent_centric.regression_assets
    level: agent_centric
    dimension: sdlc
    weight: 1
    critical: false
    why_it_matters: Broader SDLC coverage should include richer regression assets such as e2e, API, or fitness checks.
    recommended_action: Keep deeper regression assets checked in.
    evidence_hint: tests/e2e, e2e, playwright.config.ts, tests/api-contract, or docs/fitness
    detector:
      type: any_file_exists
      paths:
        - tests/e2e
        - e2e
        - playwright.config.ts
        - tests/api-contract
        - docs/fitness

  - id: sdlc.agent_first.release_automation
    level: agent_first
    dimension: sdlc
    weight: 2
    critical: true
    why_it_matters: Agent-first SDLC needs explicit release or deploy automation at the tail of the loop.
    recommended_action: Add release, deploy, or submit automation.
    evidence_hint: .github/workflows/*release*.yml or resources/flows/*release*.yaml
    detector:
      type: glob_count
      patterns:
        - .github/workflows/*release*.yml
        - .github/workflows/*release*.yaml
        - .github/workflows/*deploy*.yml
        - .github/workflows/*deploy*.yaml
        - resources/flows/*release*.yaml
      min: 1
  - id: sdlc.agent_first.autonomous_followthrough_assets
    level: agent_first
    dimension: sdlc
    weight: 1
    critical: false
    why_it_matters: Higher autonomy needs follow-through assets that survive any single contributor session.
    recommended_action: Keep checked-in reports, scripts, or flow definitions for delivery follow-through.
    evidence_hint: docs/fitness/reports, .github/scripts, scripts, or resources/flows
    detector:
      type: any_file_exists
      paths:
        - docs/fitness/reports
        - .github/scripts
        - scripts
        - resources/flows

  - id: harness.awareness.runtime_surface
    level: awareness
    dimension: harness
    weight: 2
    critical: true
    why_it_matters: A harness begins when the repository exposes a checked-in runtime or source surface.
    recommended_action: Keep a primary runtime or source tree checked in.
    evidence_hint: src, crates, cmd, apps, packages, lib, csrc, or a top-level language package tree
    detector:
      type: any_of
      detectors:
        - type: any_file_exists
          paths:
            - src
            - crates
            - cmd
            - apps
            - packages
            - lib
            - internal
            - csrc
        - type: glob_count
          patterns:
            - "*/**/*.py"
            - "*/**/*.rs"
            - "*/**/*.go"
            - "*/**/*.ts"
            - "*/**/*.tsx"
            - "*/**/*.js"
            - "*/**/*.jsx"
          min: 5
  - id: harness.awareness.local_entrypoint
    level: awareness
    dimension: harness
    weight: 1
    critical: false
    why_it_matters: Awareness-level harnesses benefit from local entrypoints contributors can invoke directly.
    recommended_action: Add local tools, scripts, or CLI entrypoints.
    evidence_hint: bin, scripts, tools, or cli
    detector:
      type: any_file_exists
      paths:
        - bin
        - scripts
        - tools
        - cli

  - id: harness.assisted.runtime_abstractions
    level: assisted_coding
    dimension: harness
    weight: 2
    critical: true
    why_it_matters: Assisted harnessing is stronger when the runtime has reusable abstractions instead of only leaf scripts.
    recommended_action: Add reusable runtime abstractions such as services, clients, managers, runtimes, or workflow layers.
    evidence_hint: source files declaring runtime, service, provider, workflow, manager, or client abstractions
    detector:
      type: glob_contains_regex
      patterns:
        - src/**/*.ts
        - src/**/*.tsx
        - src/**/*.js
        - src/**/*.jsx
        - src/**/*.py
        - src/**/*.rs
        - src/**/*.go
        - crates/**/*.rs
        - packages/**/*.ts
        - packages/**/*.tsx
        - packages/**/*.js
        - apps/**/*.ts
        - apps/**/*.tsx
        - apps/**/*.js
        - lib/**/*.py
        - lib/**/*.ts
        - lib/**/*.js
        - internal/**/*.go
        - "*/**/*.py"
        - "*/**/*.rs"
        - "*/**/*.go"
        - "*/**/*.ts"
        - "*/**/*.tsx"
        - "*/**/*.js"
        - "*/**/*.jsx"
      pattern: '\b(export|pub|class|def|func)\b.{0,120}\b(runtime|runner|service|client|manager|provider|workflow|command|executor|tool|server|adapter|model|engine|router|reporter|policy)\b'
      flags: im
      minMatches: 1
  - id: harness.assisted.local_validation_runtime
    level: assisted_coding
    dimension: harness
    weight: 1
    critical: false
    why_it_matters: Local validation surfaces are part of the harness rather than optional polish.
    recommended_action: Add reusable local validation scripts, hooks, or workflow surfaces.
    evidence_hint: tools, scripts, .github/workflows, or .husky
    detector:
      type: any_file_exists
      paths:
        - tools
        - scripts
        - .github/workflows
        - .husky

  - id: harness.structured_ai_coding.review_trigger_rules
    level: structured_ai_coding
    dimension: harness
    weight: 2
    critical: true
    why_it_matters: Structured harnesses need deterministic escalation or defense surfaces when AI changes look risky.
    recommended_action: Add review-trigger, defense, or workflow-based escalation surfaces.
    evidence_hint: docs/fitness/review-triggers.yaml or .github/workflows/defense.yaml
    detector:
      type: any_file_exists
      paths:
        - docs/fitness/review-triggers.yaml
        - .github/workflows/defense.yaml
        - .github/workflows
  - id: harness.structured_ai_coding.harness_docs
    level: structured_ai_coding
    dimension: harness
    weight: 1
    critical: false
    why_it_matters: Durable harnesses are easier to reuse when the repository keeps harness-oriented docs or rulebooks.
    recommended_action: Add docs for fitness, architecture, or runtime usage.
    evidence_hint: docs/fitness or docs/ARCHITECTURE.md
    detector:
      type: any_file_exists
      paths:
        - docs/fitness
        - docs/ARCHITECTURE.md
        - docs

  - id: harness.agent_centric.orchestration_surface
    level: agent_centric
    dimension: harness
    weight: 2
    critical: true
    why_it_matters: Agent-centric harnesses usually expose orchestration surfaces beyond a single command path.
    recommended_action: Add orchestration, agent runtime, or flow surfaces.
    evidence_hint: src/core/orchestration, src/core/acp, resources/flows, or apps
    detector:
      type: any_file_exists
      paths:
        - src/core/orchestration
        - src/core/acp
        - resources/flows
        - apps
  - id: harness.agent_centric.trace_or_reports
    level: agent_centric
    dimension: harness
    weight: 1
    critical: false
    why_it_matters: Observable execution surfaces help teams trust higher-leverage harnesses.
    recommended_action: Add traces, reports, or observability artifacts.
    evidence_hint: src/app/traces, docs/fitness/reports, traces, or observability
    detector:
      type: any_file_exists
      paths:
        - src/app/traces
        - docs/fitness/reports
        - traces
        - observability

  - id: harness.agent_first.failure_reaction_assets
    level: agent_first
    dimension: harness
    weight: 2
    critical: true
    why_it_matters: Agent-first harnesses react to failures with checked-in repair or fix assets.
    recommended_action: Add failure-reaction scripts or workflows.
    evidence_hint: .github/workflows/*fix*.yml or scripts/*repair*
    detector:
      type: glob_count
      patterns:
        - .github/workflows/*fix*.yml
        - .github/workflows/*fix*.yaml
        - .github/scripts/*fix*
        - scripts/*repair*
        - scripts/*fix*
      min: 1
  - id: harness.agent_first.background_automation_assets
    level: agent_first
    dimension: harness
    weight: 1
    critical: false
    why_it_matters: High-autonomy harnesses need background cleanup or maintenance automation to keep entropy under control.
    recommended_action: Add cleanup, GC, or background maintenance automation.
    evidence_hint: .github/workflows/*cleanup*.yml or scripts/*cleanup*
    detector:
      type: glob_count
      patterns:
        - .github/workflows/*cleanup*.yml
        - .github/workflows/*cleanup*.yaml
        - .github/workflows/*gc*.yml
        - .github/workflows/*gc*.yaml
        - .github/scripts/*cleanup*
        - scripts/*cleanup*
      min: 1

  - id: governance.awareness.repo_rules
    level: awareness
    dimension: governance
    weight: 2
    critical: true
    why_it_matters: Governance starts when repository rules are visible and reviewable.
    recommended_action: Add contributor-facing rules or policy docs.
    evidence_hint: AGENTS.md, CONTRIBUTING.md, CODE_OF_CONDUCT.md, or SECURITY.md
    detector:
      type: any_file_exists
      paths:
        - AGENTS.md
        - CONTRIBUTING.md
        - CODE_OF_CONDUCT.md
        - SECURITY.md
  - id: governance.awareness.static_check_surface
    level: awareness
    dimension: governance
    weight: 1
    critical: false
    why_it_matters: Baseline governance usually includes some checked-in static-check, build, or repository configuration surface.
    recommended_action: Add codified static-check, build, or repository configuration.
    evidence_hint: package.json, Cargo.toml, pyproject.toml, tsconfig.json, or lint config
    detector:
      type: any_file_exists
      paths:
        - package.json
        - Cargo.toml
        - pyproject.toml
        - tsconfig.json
        - eslint.config.mjs
        - eslint.config.js
        - .eslintrc.js
        - .pre-commit-config.yaml
        - .golangci.yml

  - id: governance.assisted.guardrail_hooks
    level: assisted_coding
    dimension: governance
    weight: 2
    critical: true
    why_it_matters: Assisted coding needs guardrails that run without human interpretation.
    recommended_action: Add pre-commit, hook, or workflow guardrails.
    evidence_hint: .pre-commit-config.yaml, .husky, lefthook.yml, or .github/workflows
    detector:
      type: any_file_exists
      paths:
        - .pre-commit-config.yaml
        - .husky
        - lefthook.yml
        - .github/workflows
  - id: governance.assisted.ownership_or_policy
    level: assisted_coding
    dimension: governance
    weight: 1
    critical: false
    why_it_matters: Ownership and policy artifacts make AI-generated changes easier to review consistently.
    recommended_action: Add ownership, security, or contribution policy files.
    evidence_hint: CODEOWNERS, SECURITY.md, or CONTRIBUTING.md
    detector:
      type: any_of
      detectors:
        - type: codeowners_routing
          requireCodeowners: true
          maxSensitiveUnownedFiles: 0
        - type: file_exists
          path: SECURITY.md
        - type: file_exists
          path: CONTRIBUTING.md

  - id: governance.structured_ai_coding.quality_rulebook
    level: structured_ai_coding
    dimension: governance
    weight: 2
    critical: true
    why_it_matters: Structured AI governance benefits from a checked-in rulebook rather than informal reviewer memory.
    recommended_action: Add quality, fitness, or QA rulebooks.
    evidence_hint: docs/fitness, docs/qa, or docs/quality
    detector:
      type: any_file_exists
      paths:
        - docs/fitness
        - docs/qa
        - docs/quality
  - id: governance.structured_ai_coding.automated_review_surface
    level: structured_ai_coding
    dimension: governance
    weight: 1
    critical: false
    why_it_matters: Automated review surfaces reduce the amount of purely manual interpretation in higher-maturity repos.
    recommended_action: Add workflow-backed review automation or release-drafter style assets.
    evidence_hint: .github/workflows or .github/release-drafter.yml
    detector:
      type: any_file_exists
      paths:
        - .github/workflows
        - .reviewdog.yml
        - .github/release-drafter.yml

  - id: governance.agent_centric.governance_artifacts
    level: agent_centric
    dimension: governance
    weight: 2
    critical: true
    why_it_matters: Agent-centric governance tends to accumulate explicit debt, planning, and dependency-management artifacts.
    recommended_action: Add issue, plan, debt, or dependency-management artifacts.
    evidence_hint: docs/issues, docs/exec-plans, docs/tech-debt, renovate.json, or dependabot
    detector:
      type: any_file_exists
      paths:
        - docs/issues
        - docs/exec-plans
        - docs/tech-debt
        - .github/dependabot.yml
        - renovate.json
  - id: governance.agent_centric.policy_coverage
    level: agent_centric
    dimension: governance
    weight: 1
    critical: false
    why_it_matters: A broader governance corpus suggests the repository has moved beyond one-off policy files.
    recommended_action: Expand governance-related docs and workflow coverage.
    evidence_hint: docs/**/*.md and .github/**/*.yml
    detector:
      type: glob_count
      patterns:
        - docs/**/*.md
        - .github/**/*.yml
        - .github/**/*.yaml
      min: 10

  - id: governance.agent_first.machine_readable_guardrails
    level: agent_first
    dimension: governance
    weight: 2
    critical: true
    why_it_matters: Agent-first governance should combine repository-native review triggers with separate machine-readable ownership or dependency controls.
    recommended_action: Pair review-trigger rules with CODEOWNERS, Dependabot, or Renovate so the guardrail surface is not concentrated in one file.
    evidence_hint: docs/fitness/review-triggers.yaml plus CODEOWNERS / dependabot / renovate
    detector:
      type: all_of
      detectors:
        - type: file_exists
          path: docs/fitness/review-triggers.yaml
        - type: any_of
          detectors:
            - type: codeowners_routing
              requireCodeowners: true
              maxSensitiveUnownedFiles: 0
              requireTriggerAlignment: true
            - type: file_exists
              path: renovate.json
            - type: file_exists
              path: .github/dependabot.yml
  - id: governance.agent_first.governance_history
    level: agent_first
    dimension: governance
    weight: 1
    critical: false
    why_it_matters: High-maturity governance needs breadth across incidents, plans, and design records rather than one oversized issue log.
    recommended_action: Balance the governance corpus across issues, execution plans, and design docs.
    evidence_hint: docs/issues/*.md + docs/exec-plans/**/*.md + docs/design-docs/**/*.md
    detector:
      type: all_of
      detectors:
        - type: glob_count
          patterns:
            - docs/issues/*.md
          min: 20
        - type: glob_count
          patterns:
            - docs/exec-plans/**/*.md
          min: 8
        - type: glob_count
          patterns:
            - docs/design-docs/**/*.md
          min: 5

  - id: context.awareness.readme_or_docs
    level: awareness
    dimension: context
    weight: 2
    critical: true
    why_it_matters: Durable context begins with a visible readme or docs surface that survives any single session.
    recommended_action: Add a README or repository docs directory.
    evidence_hint: README.md or docs
    detector:
      type: any_file_exists
      paths:
        - README.md
        - docs
  - id: context.awareness.architecture_hint
    level: awareness
    dimension: context
    weight: 1
    critical: false
    why_it_matters: Orientation docs help agents and humans understand the repo shape faster, even before formal architecture docs exist.
    recommended_action: Add architecture, design, or orientation docs that point contributors at the core code paths.
    evidence_hint: docs/ARCHITECTURE.md, docs, or README.md
    detector:
      type: any_file_exists
      paths:
        - docs/ARCHITECTURE.md
        - docs/architecture.md
        - ARCHITECTURE.md
        - docs/design-docs
        - docs
        - README.md

  - id: context.assisted.change_guidance
    level: assisted_coding
    dimension: context
    weight: 2
    critical: true
    why_it_matters: Assisted coding improves when the repository keeps more than a single landing page of durable change guidance.
    recommended_action: Add or expand checked-in docs that guide contributors through architecture, changes, or operations.
    evidence_hint: docs/**/*.md or multiple root markdown guides
    detector:
      type: glob_count
      patterns:
        - docs/**/*.md
        - "*.md"
      min: 3
  - id: context.assisted.reference_surfaces
    level: assisted_coding
    dimension: context
    weight: 1
    critical: false
    why_it_matters: Shared references and specs make repository knowledge more reusable across sessions and contributors.
    recommended_action: Add references, specs, changelogs, or contributor-facing knowledge surfaces.
    evidence_hint: docs, docs/references, docs/specs, CONTRIBUTING.md, or CHANGELOG.md
    detector:
      type: any_file_exists
      paths:
        - docs
        - docs/references
        - docs/specs
        - docs/product-specs
        - docs/design-docs
        - CONTRIBUTING.md
        - CHANGELOG.md

  - id: context.structured_ai_coding.documentation_depth
    level: structured_ai_coding
    dimension: context
    weight: 2
    critical: true
    why_it_matters: Structured AI coding needs more than a thin README; it needs a meaningful checked-in documentation corpus.
    recommended_action: Expand repository docs beyond a single landing page.
    evidence_hint: docs/**/*.md
    detector:
      type: glob_count
      patterns:
        - docs/**/*.md
      min: 5
  - id: context.structured_ai_coding.planning_artifacts
    level: structured_ai_coding
    dimension: context
    weight: 1
    critical: false
    why_it_matters: Planning artifacts make change intent and decomposition more durable for AI tooling.
    recommended_action: Add exec plans, issues, design docs, or specs.
    evidence_hint: docs/exec-plans, docs/issues, docs/design-docs, or specs
    detector:
      type: any_file_exists
      paths:
        - docs/exec-plans
        - docs/issues
        - docs/design-docs
        - specs

  - id: context.agent_centric.layered_docs
    level: agent_centric
    dimension: context
    weight: 2
    critical: true
    why_it_matters: Agent-centric context engineering usually comes with multiple documentation layers, not a single catch-all page.
    recommended_action: Add layered docs such as product specs, design docs, plans, or references.
    evidence_hint: docs/product-specs, docs/design-docs, docs/exec-plans, or docs/references
    detector:
      type: any_file_exists
      paths:
        - docs/product-specs
        - docs/design-docs
        - docs/exec-plans
        - docs/references
  - id: context.agent_centric.large_doc_corpus
    level: agent_centric
    dimension: context
    weight: 1
    critical: false
    why_it_matters: A larger checked-in doc corpus makes context retrieval more durable and less session-dependent.
    recommended_action: Grow the repository doc corpus to cover more architecture and workflow detail.
    evidence_hint: docs/**/*.md
    detector:
      type: glob_count
      patterns:
        - docs/**/*.md
      min: 10

  - id: context.agent_first.reference_and_runbook_depth
    level: agent_first
    dimension: context
    weight: 2
    critical: true
    why_it_matters: Agent-first context needs layered runbooks, not just a large documentation folder with one or two anchor areas.
    recommended_action: Maintain references, fitness docs, issues, and execution plans as distinct context layers, with more than a token reference corpus.
    evidence_hint: docs/references/**/*.md + docs/fitness/*.md + docs/issues/*.md + docs/exec-plans/**/*.md
    detector:
      type: all_of
      detectors:
        - type: glob_count
          patterns:
            - docs/references/**/*.md
          min: 3
        - type: glob_count
          patterns:
            - docs/fitness/*.md
          min: 5
        - type: glob_count
          patterns:
            - docs/issues/*.md
          min: 10
        - type: glob_count
          patterns:
            - docs/exec-plans/**/*.md
          min: 6
  - id: context.agent_first.operational_history
    level: agent_first
    dimension: context
    weight: 1
    critical: false
    why_it_matters: Operational history should reflect repeated execution across multiple documentation layers, not only issue accumulation.
    recommended_action: Grow the operational history across plans, design docs, and references in addition to issue logs.
    evidence_hint: docs/issues/*.md + docs/exec-plans/**/*.md + docs/design-docs/**/*.md + docs/references/**/*.md
    detector:
      type: all_of
      detectors:
        - type: glob_count
          patterns:
            - docs/issues/*.md
          min: 30
        - type: glob_count
          patterns:
            - docs/exec-plans/**/*.md
          min: 8
        - type: glob_count
          patterns:
            - docs/design-docs/**/*.md
          min: 5
        - type: glob_count
          patterns:
            - docs/references/**/*.md
          min: 3
