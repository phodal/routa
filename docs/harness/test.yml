schema: harness-surface-v1
surface: test
title: 测试反馈
summary: 把测试入口、配置文件和 coverage / reports 证据压缩到一个 test view 里。
overview:
  - id: repository-shape
    label: Repository shape
    source: files
    paths:
      - package.json
      - pnpm-lock.yaml
      - package-lock.json
      - yarn.lock
      - Cargo.toml
    limit: 5
  - id: config-evidence
    label: Config & evidence
    source: files
    paths:
      - vitest.config.ts
      - vitest.setup.ts
      - playwright.config.ts
      - playwright.tauri.config.ts
      - tests/api-contract/run.ts
      - docs/fitness/unit-test.md
      - docs/fitness/rust-api-test.md
      - docs/fitness/web-qa-e2e-matrix.md
    limit: 8
  - id: artifacts
    label: Artifacts
    source: files
    paths:
      - coverage
      - test-results
      - docs/fitness/reports
    limit: 4
entrypointGroups:
  - id: unit
    label: Unit / component
    category: unit
    scriptNamePatterns:
      - "^scripts:test($|:.*)"
      - "^test$"
      - "^test:run$"
      - "^test:ui$"
  - id: e2e
    label: Browser / integration
    category: e2e
    scriptNamePatterns:
      - "^test:e2e($|:.*)"
  - id: quality
    label: Contract / quality
    category: quality
    scriptNamePatterns:
      - "^api:test($|:.*)"
      - "^api:check($|:.*)"
      - "^api:validate($|:.*)"
      - "^api:schema:.*"
      - "^test:accessibility$"
      - "^test:performance$"
      - "^test:otel:trace$"
  - id: coverage
    label: Coverage
    category: coverage
    scriptNamePatterns:
      - "^test:cov:ts$"
      - "^rust:cov($|:.*)"
